version: "3.8"
services:
  droid-chat:
    build: ..
    container_name: droid-chat-telegram
    restart: always
    env_file: ../config/.env
    volumes:
      - ../data:/app/data
      - ~/.factory:/root/.factory:ro
    environment:
      - PLATFORM=telegram

  # Uncomment for WhatsApp
